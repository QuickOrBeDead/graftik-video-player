name: "graftik-video-player"
arch: "amd64"
platform: "linux"
version: "0.0.1"
section: "video"
priority: "optional"
maintainer: "Bora Akgün <boraakgn@gmail.com>"
description: "Graftik Video Player"
homepage: "https://github.com/QuickOrBeDead/graftik-video-player"
license: "MIT"
contents:
  - src: ../bin/graftik-video-player
    dst: /usr/lib/graftik-video-player/graftik-video-player
  - src: ../bin/bin/ffmpeg
    dst: /usr/lib/graftik-video-player/bin/ffmpeg
  - src: ../bin/bin/ffprobe
    dst: /usr/lib/graftik-video-player/bin/ffprobe
  - type: symlink
    dst: /usr/bin/graftik-video-player
    src: /usr/lib/graftik-video-player/graftik-video-player
  - src: graftik-video-player.desktop
    dst: /usr/share/applications/graftik-video-player.desktop
  - src: ../16x16.png
    dst: /usr/share/icons/hicolor/16x16/apps/graftik-video-player.png
  - src: ../24x24.png
    dst: /usr/share/icons/hicolor/24x24/apps/graftik-video-player.png
  - src: ../32x32.png
    dst: /usr/share/icons/hicolor/32x32/apps/graftik-video-player.png
  - src: ../48x48.png
    dst: /usr/share/icons/hicolor/48x48/apps/graftik-video-player.png
  - src: ../64x64.png
    dst: /usr/share/icons/hicolor/64x64/apps/graftik-video-player.png
  - src: ../128x128.png
    dst: /usr/share/icons/hicolor/128x128/apps/graftik-video-player.png
  - src: ../256x256.png
    dst: /usr/share/icons/hicolor/256x256/apps/graftik-video-player.png
  - src: ../512x512.png
    dst: /usr/share/icons/hicolor/512x512/apps/graftik-video-player.png
  - src: ../appicon.png
    dst: /usr/share/icons/hicolor/1024x1024/apps/graftik-video-player.png

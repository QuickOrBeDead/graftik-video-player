name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_run:
    workflows: ["Create Release"]
    types: [completed]
  workflow_dispatch:

jobs:
  build:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            nsis: -nsis
          - os: ubuntu-latest
            platform: linux/amd64
            nsis: ''

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag is on main branch
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          if ! git branch -r --contains "${{ github.ref_name }}" | grep -q 'origin/main'; then
            echo "Tag ${{ github.ref_name }} is not on main branch. Aborting."
            exit 1
          fi

      - name: Extract version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            REF_NAME="${{ github.ref_name }}"
            echo "value=${REF_NAME#v}" >> $GITHUB_OUTPUT
          else
            echo "value=$(git describe --tags --abbrev=0 2>/dev/null || echo '0.0.0')" >> $GITHUB_OUTPUT
          fi

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install system dependencies (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: choco install mingw nsis -y

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Cache FFmpeg (Windows)
        if: matrix.os == 'windows-latest'
        id: cache-ffmpeg-windows
        uses: actions/cache@v4
        with:
          path: build/windows/bin
          key: ffmpeg-windows-${{ runner.arch }}-20260628

      - name: Download FFmpeg (Windows)
        if: matrix.os == 'windows-latest' && steps.cache-ffmpeg-windows.outputs.cache-hit != 'true'
        shell: pwsh
        run: .\build\windows\download-ffmpeg.ps1

      - name: Cache FFmpeg (Linux)
        if: matrix.os == 'ubuntu-latest'
        id: cache-ffmpeg-linux
        uses: actions/cache@v4
        with:
          path: build/linux/bin
          key: ffmpeg-linux-${{ runner.arch }}-20260628

      - name: Download FFmpeg (Linux)
        if: matrix.os == 'ubuntu-latest' && steps.cache-ffmpeg-linux.outputs.cache-hit != 'true'
        run: bash build/linux/download-ffmpeg.sh

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        run: wails build -platform ${{ matrix.platform }} -clean -tags webkit2_41 -ldflags "-X main.appVersion=${{ steps.version.outputs.value }}" ${{ matrix.nsis }}
        env:
          CGO_ENABLED: 1

      - name: Bundle FFmpeg with executable (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "build/bin/bin" -Force
          Copy-Item "build/windows/bin/ffmpeg.exe" "build/bin/bin/"
          Copy-Item "build/windows/bin/ffprobe.exe" "build/bin/bin/"

      - name: Bundle FFmpeg with executable (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p "build/bin/bin"
          cp build/linux/bin/ffmpeg build/bin/bin/
          cp build/linux/bin/ffprobe build/bin/bin/
          chmod +x build/bin/bin/*

      - name: Install nfpm
        if: matrix.os == 'ubuntu-latest'
        run: |
          echo 'deb [trusted=yes] https://repo.goreleaser.com/apt/ /' | sudo tee /etc/apt/sources.list.d/goreleaser.list
          sudo apt update && sudo apt install nfpm

      - name: Build .deb package
        if: matrix.os == 'ubuntu-latest'
        run: nfpm pkg --packager deb --target ${{ github.workspace }}/build/bin/
        working-directory: build/linux
        env:
          VERSION: ${{ steps.version.outputs.value }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: graftik-video-player-${{ matrix.os }}
          path: build/bin/**
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          pattern: graftik-video-player-*
          merge-multiple: true
          path: build/bin

      - name: Determine tag
        id: tag
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            echo "name=$TAG" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        if: steps.tag.outputs.name != ''
        run: |
          PRERELEASE=""
          if [[ "${{ steps.tag.outputs.name }}" == *-beta* || "${{ steps.tag.outputs.name }}" == *-alpha* ]]; then
            PRERELEASE="--prerelease"
          fi
          gh release create "${{ steps.tag.outputs.name }}" $PRERELEASE \
            --title "${{ steps.tag.outputs.name }}" \
            --notes "See the commits for details." \
            build/bin/*.deb
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Upload Windows installer to release
        if: steps.tag.outputs.name != ''
        run: gh release upload "${{ steps.tag.outputs.name }}" build/bin/*-installer.exe --clobber
        env:
          GH_TOKEN: ${{ github.token }}

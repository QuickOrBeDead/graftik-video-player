name: Create Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., 0.1.0, 0.1.0-alpha.1, or 0.1.0-beta.1)'
        required: true
      prerelease:
        description: 'Mark as prerelease (alpha/beta)'
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate version
        run: |
          if ! [[ "${{ inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-(alpha|beta)\.[0-9]+)?$ ]]; then
            echo "Invalid version format. Use semver: 0.1.0, 0.1.0-alpha.1, or 0.1.0-beta.1"
            exit 1
          fi

      - name: Create and push tag
        run: |
          git tag "v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"
